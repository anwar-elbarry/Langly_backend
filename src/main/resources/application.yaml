spring:
  application:
    name: langly
# Postgres Connection
  datasource:
      url: jdbc:postgresql://localhost:5432/${DB_NAME}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8081