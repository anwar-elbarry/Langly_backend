spring:
  application:
    name: langly
# Postgres Connection
  datasource:
      url: jdbc:postgresql://localhost:5432/${DB_NAME}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      repositories:
        enabled: false
server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  refreshExpiration: 604800000
  expiration: 86400000

resend:
  api-key: ${RESEND_API_KEY}
  from-email: onboarding@resend.dev

app:
  base-url: ${APP_BASE_URL}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  mail:
    enabled: false   # set to true in production with a verified Resend domain
  seed-fake-data: ${SEED_FAKE_DATA:true}   # set to false in production — wipes & re-seeds all data on startup

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

file:
  upload-dir: ${UPLOAD_DIR:./uploads}
